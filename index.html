<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سودان واحد 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00c6ff);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    width: 340px;
    text-align: center;
    color: white;
}

h1 { color: #fff; }

p {
    font-size: 14px;
    color: #ddd;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #00c6ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #00e0ff;
}

#result {
    margin-top: 20px;
    font-size: 15px;
    color: #fff;
    line-height: 1.6;
}

#scan {
    display: none;
    margin-top: 15px;
    font-size: 14px;
    color: #00e0ff;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0.3;}
    100% {opacity: 1;}
}
</style>

</head>

<body>

<div class="card">
    <h1>سودان واحد 🤍</h1>
    <p>ارفع صورتك وخد رسالة من القلب</p>

    <input type="file" id="file">

    <button onclick="generate()">احصل على رسالتك</button>

    <div id="scan">AI scanning your image... 🤖</div>

    <div id="result"></div>
</div>

<script>
function generate() {

    const scan = document.getElementById("scan");
    const box = document.getElementById("result");

    scan.style.display = "block";
    box.innerHTML = "";

    const messages = [
        {text:"أنت شخص جميل بطريقتك الخاصة 🤍", author:"سودان واحد"},
        {text:"فيك طيبة بتخلي العالم أهدى", author:"رسالة"},
        {text:"وجودك مهم حتى لو ما حاسس", author:"دعم"},
        {text:"ابتسامتك ممكن تغيّر يوم شخص", author:"نور"},
        {text:"إنت أقوى مما تتخيل", author:"رسالة مجهولة"},
        {text:"إحنا مختلفين لكن القلوب واحدة 🤍", author:"سودان واحد"}
    ];

    setTimeout(() => {

        scan.style.display = "none";

        const msg = messages[Math.floor(Math.random() * messages.length)];

        box.innerHTML = `
            ✨ ${msg.text} <br><br>
            <small>— ${msg.author}</small>
        `;

    }, 2000);

    document.getElementById("file").value = "";
}
</script>

</body>
</html>
