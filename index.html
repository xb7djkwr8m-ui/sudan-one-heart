<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سودان واحد 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: black;
}

.container {
    width: 340px;
    text-align: center;
}

.main-card {
    background: white;
    padding: 15px;
    border-radius: 15px;
}

video, img {
    width: 100%;
    border-radius: 12px;
}

.video-box {
    position: relative;
}

.emoji {
    position: absolute;
    top: 30%;
    left: 40%;
    font-size: 50px;
    display: none;
}

/* 🎨 بطاقات */
.card {
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    opacity: 0;
    transform: translateY(20px);
    animation: show 0.5s forwards;
}

.card-black { background:black; color:white; }
.card-white { background:white; color:black; }
.card-red { background:red; color:white; }

@keyframes show {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
}

#scan {
    margin-top: 10px;
    display: none;
    color: black;
}
</style>
</head>

<body>

<div class="container">

<div class="main-card">
<h3>سودان واحد 🤍</h3>

<div class="video-box">
<video id="video" autoplay></video>
<img id="img" style="display:none;">
<div class="emoji" id="emoji">😂</div>
</div>

<button onclick="capture()">التقاط</button>
<div id="scan">جارٍ التعرف على الوجه... 🤖</div>
</div>

<div id="cards"></div>

</div>

<script>
const video = document.getElementById("video");
const img = document.getElementById("img");
const scan = document.getElementById("scan");
const cards = document.getElementById("cards");
const emoji = document.getElementById("emoji");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

const messages = ["إنت جزء من سودان واحد 🤍","وجودك مهم","الاختلاف جمال"];
const tips = ["💡 لا للعنصرية","💡 السلام أهم","💡 الكلمة الطيبة"];
const nice = ["أنت جميل 🤍","إنت مهم ✨","وجودك بيفرق"];

function capture() {

    scan.style.display = "block";
    cards.innerHTML = "";

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    img.src = canvas.toDataURL();
    img.style.display = "block";
    video.style.display = "none";

    setTimeout(() => {

        scan.innerHTML = "تم التعرف على الوجه ✔️";
        emoji.style.display = "block";

        let m = messages[Math.floor(Math.random()*messages.length)];
        let t = tips[Math.floor(Math.random()*tips.length)];
        let n = nice[Math.floor(Math.random()*nice.length)];

        // 👇 يظهروا واحد واحد
        setTimeout(() => {
            cards.innerHTML += `<div class="card card-black">✨ ${m}</div>`;
        }, 300);

        setTimeout(() => {
            cards.innerHTML += `<div class="card card-white">${t}</div>`;
        }, 900);

        setTimeout(() => {
            cards.innerHTML += `<div class="card card-red">💬 ${n}</div>`;
        }, 1500);

    }, 2000);
}
</script>

</body>
</html>
