<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سودان واحد 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f7fa;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 18px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

video {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #333;
}

#result {
    margin-top: 15px;
    font-size: 15px;
    color: #222;
}
</style>
</head>

<body>

<div class="card">
    <h1>سودان واحد 🤍</h1>
    <p>صور نفسك بالكاميرا وخد رسالتك</p>

    <video id="video" autoplay></video>

    <button onclick="capture()">التقاط الصورة</button>

    <div id="result"></div>
</div>

<script>
const video = document.getElementById("video");
const result = document.getElementById("result");

// تشغيل الكاميرا
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// الرسائل
const messages = [
    "أنت شخص جميل بطريقتك الخاصة 🤍",
    "فيك طيبة بتخلي الناس ترتاح ليك",
    "وجودك مهم حتى لو ما حاسس",
    "ابتسامتك بتفرق في يوم غيرك",
    "إنت أقوى مما تتخيل"
];

function capture() {

    result.innerHTML = "جاري تحليل صورتك...";

    setTimeout(() => {

        const msg = messages[Math.floor(Math.random()*messages.length)];

        result.innerHTML = "✨ " + msg;

    }, 1500);
}
</script>

</body>
</html>
