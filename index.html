<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Sudan Unity Test 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.6s;
    color:white;
}

/* 🌍 الخلفيات */
body.good{
    background: linear-gradient(to bottom, #000 33%, #fff 33%, #fff 66%, #d40000 66%);
}
body.mid{
    background: linear-gradient(135deg, #1a1a1a, #333, #111);
}
body.bad{
    background: linear-gradient(135deg, #000, #400000, #000);
}

.container{
    width:340px;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:22px;
    border-radius:18px;
    text-align:center;
}

/* السؤال */
#question{
    font-size:18px;
    margin-bottom:15px;
}

/* الأزرار */
.option button{
    width:48%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
.yes{background:#00c6ff;}
.no{background:#ff4d4d;}

/* النتائج */
#results{
    margin-top:15px;
}

.card-item{
    margin-top:10px;
    padding:14px;
    border-radius:14px;
    animation:pop 0.4s ease forwards;
    opacity:0;
    transform:translateY(10px);
}

@keyframes pop{
    to{opacity:1;transform:translateY(0);}
}

.black{background:#000;}
.white{background:#fff;color:#000;}
.red{background:#b00000;}
</style>
</head>

<body>

<div class="container">

<div class="card" id="quiz">

<h2>Sudan Unity Test 🤍</h2>

<div id="question">هل تحب السلام؟</div>

<div class="option">
<button class="yes" onclick="answer('yes')">نعم</button>
<button class="no" onclick="answer('no')">لا</button>
</div>

</div>

<div id="results"></div>

</div>

<script>

let step=0;
let score=0;

const questions=[
"هل تحب السلام؟",
"هل تتقبل اختلاف الآخرين والقبائل؟",
"هل تؤمن أن الناس متساويين وكلهم واحد؟",
"هل تقف ضد العنصرية؟"
];

document.getElementById("question").innerText=questions[0];

function answer(ans){

    if(ans==="yes") score++;

    step++;

    if(step<questions.length){
        document.getElementById("question").innerText=questions[step];
    }else{
        showResult();
    }
}

function showResult(){

    document.getElementById("quiz").style.display="none";

    const box=document.getElementById("results");

    box.innerHTML="";
    document.body.className="";

    // 🟢 كله نعم
    if(score===4){

        document.body.className="good";

        box.innerHTML=`
        <div class="card-item black">🤍 أنت تؤمن بالسلام والوحدة</div>
        <div class="card-item white">💡 السودان واحد مهما اختلفنا</div>
        <div class="card-item red">✨ موقفك إيجابي تجاه التنوع</div>
        <div class="card-item white">🤍 ما في مسميات بتختزل الإنسان</div>
        `;

    }

    // 🟡 مختلط
    else if(score>=1 && score<=3){

        document.body.className="mid";

        box.innerHTML=`
        <div class="card-item white">⚠️ لديك مساحة لإعادة التفكير في بعض المفاهيم</div>
        <div class="card-item black">💡 التنوع قوة وليس تهديد</div>
        <div class="card-item red">🤍 الاحترام أساس التعايش</div>
        <div class="card-item white">🤍 ما في مسميات بتختزل الإنسان</div>
        `;

    }

    // 🔴 كله لا
    else{

        document.body.className="bad";

        box.innerHTML=`
        <div class="card-item red">⚠️ هذا التفكير يعارض مبدأ التعايش</div>
        <div class="card-item black">💡 الاختلاف لا يعني الكراهية</div>
        <div class="card-item white">🤍 نأمل إعادة النظر في مفهوم الكرامة الإنسانية</div>
        <div class="card-item red">🤍 ما في مسميات بتختزل الإنسان</div>
        `;
    }
}

</script>

</body>
</html>
